tasks:
  - name: freexzteam_daily
    bot: "@freexzteam_bot"
    command: "/sign"
    accounts: ["main", "alt1", "alt2"]
    schedule:
      mode: calendar_day
      timezone: Asia/Shanghai
      earliest_time: "00:05"
      random_delay_minutes: [5, 45]

  - name: dw759_interval
    bot: "@dw759bot"
    command: "/sign"
    accounts: ["main", "alt1", "alt2"]
    schedule:
      mode: interval_after_success
      min_interval_hours: 24
      random_delay_minutes: [5, 40]
